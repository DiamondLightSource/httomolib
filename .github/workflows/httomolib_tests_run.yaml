name: tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v5

      # setup Python 3.12
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # install httomolib
      - name: Install httomolib
        run: |
          pip install -e .
          pip list

      # run tests
      - name: Run CPU tests
        run: |      
          pip install pytest
          pip install pytest_mock
          pytest
